networks:
  internal:
    driver: bridge

services:
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    networks:
      - internal
    command:
      - gotenberg
      - --api-port=8090
    ports:
      - "8090:8090"

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - gotenberg
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      GOTENBERG_URL: http://gotenberg:8090
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
