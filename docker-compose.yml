services:
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    expose:
      - "8080"

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      - gotenberg
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      GOTENBERG_URL: http://gotenberg:8080
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
