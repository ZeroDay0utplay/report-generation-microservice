services:
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    expose:
      - "4000"

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      - gotenberg
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      GOTENBERG_URL: http://gotenberg:4000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
